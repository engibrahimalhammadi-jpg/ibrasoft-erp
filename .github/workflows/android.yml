name: Build IbraSoft ERP App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Build PWA
        run: |
          npm install -g @pwabuilder/pwabuilder-cli
          pwabuilder package --copy --platforms android --url "https://engibrahimalhammadi-jpg.github.io/ibrasoft-erp/" --output ./output
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IbraSoft-ERP-APK
          path: ./output/android/
