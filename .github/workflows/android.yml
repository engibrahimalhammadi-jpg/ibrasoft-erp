name: Build IbraSoft ERP App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Build Android APK and AAB Packages
        uses: pwabuilder/github-action-pwa-android@main
        with:
          pwa-url: "https://engibrahimalhammadi-jpg.github.io/ibrasoft-erp/"
